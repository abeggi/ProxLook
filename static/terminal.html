<!DOCTYPE html>
<html>
<head>
    <title>SSH Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        #terminal-container {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <div id="terminal-container"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const host = urlParams.get('host');
        document.title = `SSH — ${host}`;

        // Get credentials from sessionStorage
        const credKey = `ssh_creds_${host}`;
        const creds = JSON.parse(sessionStorage.getItem(credKey));
        // sessionStorage.removeItem(credKey); // Should remove, but maybe keep for reconnect? Instructions say "read and deleted immediately"

        if (!creds) {
            alert("No credentials found. Please open from the main interface.");
            window.close();
        }

        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#1e1e1e' },
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            fontSize: 14
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/ssh/${host}`;
        const socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            // Send initial credentials and terminal size
            const initMsg = {
                ...creds,
                cols: term.cols,
                rows: term.rows
            };
            socket.send(JSON.stringify(initMsg));
            sessionStorage.removeItem(credKey); 
        };

        socket.onmessage = (event) => {
            if (typeof event.data === 'string') {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'close') {
                        term.write('\r\n\x1b[31mSession closed.\x1b[0m\r\n');
                        setTimeout(() => window.close(), 1500);
                    }
                } catch (e) {
                    // String data might be raw terminal output too if the server sends it as text
                    term.write(event.data);
                }
            } else {
                // Binary data (bytes)
                const reader = new FileReader();
                reader.onload = () => {
                    term.write(new Uint8Array(reader.result));
                };
                reader.readAsArrayBuffer(event.data);
            }
        };

        socket.onerror = (err) => {
            term.write('\r\n\x1b[31mWebSocket Error\x1b[0m\r\n');
            setTimeout(() => window.close(), 1500);
        };

        socket.onclose = () => {
            term.write('\r\n\x1b[31mConnection closed.\x1b[0m\r\n');
            setTimeout(() => window.close(), 1500);
        };

        term.onData(data => {
            socket.send(data);
        });

        window.addEventListener('resize', () => {
            fitAddon.fit();
            socket.send(JSON.stringify({
                type: 'resize',
                cols: term.cols,
                rows: term.rows
            }));
        });
    </script>
</body>
</html>
